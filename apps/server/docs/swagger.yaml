info:
  contact: {}
paths:
  /api/v1/health:
    get:
      description: Returns the health status of the server along with uptime and memory
        usage
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server_internal_models.HealthResponse'
      summary: Health Check
      tags:
      - Health
  /api/v1/todos:
    get:
      description: Retrieves all todo items
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/server_internal_models.Todo'
            type: array
      summary: Get all todos
      tags:
      - Todos
    post:
      consumes:
      - application/json
      description: Creates a new todo item with the provided text
      parameters:
      - description: Todo creation request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/server_internal_models.CreateTodoRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/server_internal_models.Todo'
        "400":
          description: Invalid request body or missing text
          schema:
            type: string
      summary: Create a new todo
      tags:
      - Todos
  /api/v1/todos/{id}:
    delete:
      description: Deletes a todo item by its ID
      parameters:
      - description: Todo ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "400":
          description: Invalid ID
          schema:
            type: string
        "404":
          description: Todo not found
          schema:
            type: string
      summary: Delete a todo
      tags:
      - Todos
    get:
      description: Retrieves a single todo item by its ID
      parameters:
      - description: Todo ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server_internal_models.Todo'
        "400":
          description: Invalid ID
          schema:
            type: string
        "404":
          description: Todo not found
          schema:
            type: string
      summary: Get a todo by ID
      tags:
      - Todos
    put:
      consumes:
      - application/json
      description: Updates an existing todo item by its ID
      parameters:
      - description: Todo ID
        in: path
        name: id
        required: true
        type: string
      - description: Todo update request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/server_internal_models.UpdateTodoRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server_internal_models.Todo'
        "400":
          description: Invalid ID or request body
          schema:
            type: string
        "404":
          description: Todo not found
          schema:
            type: string
      summary: Update a todo
      tags:
      - Todos
  /auth/access-control/permissions:
    get:
      description: Retrieves all permissions (admin only).
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/types.Permission'
            type: array
        "401":
          description: Unauthorized
          schema:
            type: string
      summary: Get all permissions
      tags:
      - Auth Access Control
    post:
      consumes:
      - application/json
      description: Creates a new permission (admin only).
      parameters:
      - description: Create permission request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/types.CreatePermissionRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/types.CreatePermissionResponse'
        "400":
          description: Bad request
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
      summary: Create permission
      tags:
      - Auth Access Control
  /auth/access-control/permissions/{permission_id}:
    delete:
      description: Deletes a permission by ID (admin only).
      parameters:
      - description: Permission ID
        in: path
        name: permission_id
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/types.DeletePermissionResponse'
        "401":
          description: Unauthorized
          schema:
            type: string
        "404":
          description: Not found
          schema:
            type: string
      summary: Delete permission
      tags:
      - Auth Access Control
    get:
      description: Retrieves a single permission by ID (admin only).
      parameters:
      - description: Permission ID
        in: path
        name: permission_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/types.Permission'
        "401":
          description: Unauthorized
          schema:
            type: string
        "404":
          description: Not found
          schema:
            type: string
      summary: Get permission by ID
      tags:
      - Auth Access Control
    patch:
      consumes:
      - application/json
      description: Updates an existing permission by ID (admin only).
      parameters:
      - description: Permission ID
        in: path
        name: permission_id
        required: true
        type: string
      - description: Update permission request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/types.UpdatePermissionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/types.UpdatePermissionResponse'
        "400":
