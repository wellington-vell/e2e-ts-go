language: go
layer: application

tasks:
  dev:
    command: 'go tool air -c .air.toml'

  build:
    command: "go build -o dist/main cmd/main.go"
    inputs:
      - "cmd/**/*"
      - "internal/**/*"
    outputs:
      - "dist/main"

  clean:
    script: "rm -rf .tmp dist && go clean -cache -testcache -modcache"

  check:
    script: 'golangci-lint run && go tool gofumpt -w -l .'

  start:
    command: "dist/main"
    deps:
      - "server:build"

  swagger:
    command: "swag init -g cmd/main.go -o docs --parseDependency --parseInternal"

  migrate-status:
    command: "go run cmd/migrate/main.go status"
    options:
      envFile: true

  migrate-up:
    command: "go run cmd/migrate/main.go up"
    options:
      envFile: true

  migrate-down:
    command: "go run cmd/migrate/main.go down"
    options:
      envFile: true
