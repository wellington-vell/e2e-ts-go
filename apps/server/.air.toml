#:schema https://json.schemastore.org/any.json

env_files = ["../../.env"]
root = "."
tmp_dir = ".tmp"

[build]
  bin = "./.tmp/main"
  cmd = "go build -o ./.tmp/main ./cmd"
  entrypoint = ["./.tmp/main"]
  exclude_dir = ["assets", ".tmp", "vendor", "testdata"]
  exclude_regex = ["_test\\.go"]
  exclude_unchanged = false
  follow_symlink = false
  ignore_dangerous_root_dir = false
  include_ext = ["go", "tpl", "tmpl", "html"]
  kill_delay = 500
  log = "build-errors.log"
  poll = false
  poll_interval = 0
  rerun = false
  rerun_delay = 500
  stop_on_error = true

[color]
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  silent = false
  time = false

[misc]
  clean_on_exit = true